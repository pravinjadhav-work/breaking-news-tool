<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breaking News Template Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Main editor controls -->
    <aside class="controls">
      <h1>Breaking News Tool</h1>
      <p>Upload image, edit text, select highlight phrase, then download.</p>

      <div class="upload-field">
        <label class="upload-label" for="imageUpload">Upload Image</label>
        <div class="upload-control">
          <span class="upload-button" aria-hidden="true">Choose Image</span>
          <input id="imageUpload" class="upload-input" type="file" accept="image/*" />
        </div>
      </div>

      <label>
        Headline
        <textarea id="headline" rows="4">PM MODI CALLS AN URGENT ALL PARTY MEETING TODAY ON THIS IMAGE TOOL!</textarea>
      </label>

      <label>
        Highlight phrase
        <input id="highlight" type="text" value="ALL PARTY MEETING" />
      </label>

      <div class="grid">
        <label>Day<input id="day" type="text" value="09" /></label>
        <label>Month<input id="month" type="text" value="OCT" /></label>
      </div>

      <label>
        Watermark
        <input id="watermark" type="text" value="THEPRAVINJADHAV" />
      </label>

      <!-- Image positioning controls -->
      <details open>
        <summary>Image Position</summary>
        <label>
          <span class="range-label">Zoom <b id="zoomValue">1.08</b></span>
          <input id="zoom" type="range" min="1" max="2.5" step="0.01" value="1.0" />
        </label>
        <label>
          <span class="range-label">Image X <b id="imageXValue">0</b></span>
          <input id="imageX" type="range" min="-100" max="100" step="1" value="0" />
        </label>
        <label>
          <span class="range-label">Image Y <b id="imageYValue">-15</b></span>
          <input id="imageY" type="range" min="-100" max="100" step="1" value="0" />
        </label>
      </details>

      <!-- Typography and layout controls -->
      <details>
        <summary>Other Settings</summary>
        <label>
          <span class="range-label">Breaking size <b id="breakingSizeValue">285</b></span>
          <input id="breakingSize" type="range" min="180" max="285" step="1" value="285" />
        </label>
        <label>
          <span class="range-label">Headline size <b id="headlineSizeValue">58</b></span>
          <input id="headlineSize" type="range" min="48" max="78" step="1" value="58" />
        </label>
        <label>
          <span class="range-label">Breaking Headline Gap <b id="breakingHeadlineGapValue">20</b></span>
          <input id="breakingHeadlineGap" type="range" min="-40" max="80" step="1" value="20" />
        </label>
        <label>
          <span class="range-label">Headline Letter Spacing <b id="headlineLetterSpacingValue">0</b></span>
          <input id="headlineLetterSpacing" type="range" min="-2" max="8" step="0.5" value="0" />
        </label>
        <label>
          <span class="range-label">Headline Word Spacing <b id="headlineWordSpacingValue">9</b></span>
          <input id="headlineWordSpacing" type="range" min="0" max="25" step="1" value="9" />
        </label>
        <label>
          <span class="range-label">Headline Line Spacing <b id="headlineLineSpacingValue">1.05</b></span>
          <input id="headlineLineSpacing" type="range" min="0.85" max="1.35" step="0.01" value="1.05" />
        </label>
        <label>
          <span class="range-label">Top padding <b id="topPaddingValue">10</b></span>
          <input id="topPadding" type="range" min="10" max="70" step="1" value="10" />
        </label>
        <label>
          <span class="range-label">Fade height <b id="fadeHeightValue">260</b></span>
          <input id="fadeHeight" type="range" min="90" max="260" step="1" value="260" />
        </label>
        <label>
          <span class="range-label">Fade Strength <b id="fadeStrengthValue">100</b></span>
          <input id="fadeStrength" type="range" min="0" max="100" step="1" value="100" />
        </label>
        <label>
          <span class="range-label">Watermark Size <b id="watermarkSizeValue">25</b></span>
          <input id="watermarkSize" type="range" min="18" max="60" step="1" value="25" />
        </label>
        <label>
          <span class="range-label">Date size <b id="dateSizeValue">100</b></span>
          <input id="dateSize" type="range" min="90" max="145" step="1" value="100" />
        </label>
        <label>
          <span class="range-label">Date X <b id="dateXValue">40</b></span>
          <input id="dateX" type="range" min="10" max="160" step="1" value="40" />
        </label>
        <label>
          <span class="range-label">Date bottom <b id="dateYValue">55</b></span>
          <input id="dateY" type="range" min="30" max="180" step="1" value="55" />
        </label>
      </details>

      <button id="downloadBtn">Download PNG</button>
      <div class="panel-footer" aria-label="Developer credit and contact">
        <div class="panel-footer__text">

        </div>
      </div>
    </aside>

    <!-- Poster preview canvas -->
    <main class="previewWrap">
      <canvas id="poster" width="1080" height="1350"></canvas>
    </main>
  </div>

  <script src="script.js"></script>
</body>
